{% extends "base.html" %}
{% block content %}
<div class="card p-4 p-md-5">
  <h2 class="mb-1 fw-bold">Upload CSV</h2>
  <p class="text-muted mb-4">Upload a CSV file containing website URLs to scan for Google Ads pixels.</p>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/upload" enctype="multipart/form-data">
    <div class="mb-4">
      <label class="form-label fw-semibold">CSV File</label>
      <input class="form-control form-control-lg" type="file" name="csv_file" accept=".csv" required />
      <div class="form-text">Max file size: 50 MB. Must be UTF-8 encoded.</div>
    </div>
    <button type="submit" class="btn btn-primary btn-lg w-100">
      Upload &amp; Map Columns →
    </button>
  </form>
</div>
{% endblock %}
