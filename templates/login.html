<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Google Ads Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); width: 100%; max-width: 380px; }
    .btn-primary { background: #1a73e8; border-color: #1a73e8; }
    .btn-primary:hover { background: #1557b0; border-color: #1557b0; }
  </style>
</head>
<body>
  <div class="card p-4 p-md-5 mx-3">
    <h2 class="fw-bold mb-1 text-center">Google Ads Analyzer</h2>
    <p class="text-muted text-center mb-4">Sign in to continue</p>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.next %}?next={{ request.args.next }}{% endif %}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input class="form-control" type="text" name="username" autofocus autocomplete="username" required />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input class="form-control" type="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">Sign in</button>
    </form>
  </div>
</body>
</html>
